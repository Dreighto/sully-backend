<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<title>Sully — Chat</title>
		<style>
			:root {
				--bg: #050505;
				--magenta-deep: #c4186a;
				--magenta: #ec2d78;
				--magenta-bright: #ff4d94;
				--magenta-soft: #ff7eb3;
				--magenta-glow: #ff8fc0;
				--text: #f4f4f6;
				--text-dim: #d6d6db;
				--text-muted: #9a9aa3;
				--glass-stroke: rgba(255, 255, 255, 0.08);
				--glass-highlight: rgba(255, 255, 255, 0.14);
			}

			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				-webkit-tap-highlight-color: transparent;
			}

			html,
			body {
				height: 100%;
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
				background: #000;
				color: var(--text);
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				-webkit-font-smoothing: antialiased;
				overflow: hidden;
			}

			/* ============ PHONE SHELL ============ */
			.phone {
				position: relative;
				width: 420px;
				height: 912px;
				max-height: 100vh;
				background: var(--bg);
				overflow: hidden;
				display: flex;
				flex-direction: column;
				box-shadow: 0 40px 120px rgba(0, 0, 0, 0.8);
			}

			/* ============ LIVING AURORA BACKGROUND ============ */
			.aurora {
				position: absolute;
				inset: -30% -30% -30% -30%;
				z-index: 0;
				pointer-events: none;
				filter: blur(60px);
				opacity: 0.55;
			}
			.aurora span {
				position: absolute;
				border-radius: 50%;
				mix-blend-mode: screen;
				will-change: transform, opacity;
			}
			.aurora .a1 {
				width: 460px;
				height: 460px;
				top: 4%;
				left: -22%;
				background: radial-gradient(
					circle at 30% 30%,
					rgba(236, 45, 120, 0.42),
					rgba(196, 24, 106, 0) 68%
				);
				animation: drift1 26s ease-in-out infinite;
			}
			.aurora .a2 {
				width: 520px;
				height: 520px;
				top: 30%;
				right: -28%;
				background: radial-gradient(
					circle at 50% 50%,
					rgba(255, 77, 148, 0.34),
					rgba(255, 77, 148, 0) 66%
				);
				animation: drift2 32s ease-in-out infinite;
			}
			.aurora .a3 {
				width: 420px;
				height: 420px;
				bottom: -8%;
				left: 8%;
				background: radial-gradient(
					circle at 50% 50%,
					rgba(196, 24, 106, 0.4),
					rgba(196, 24, 106, 0) 70%
				);
				animation: drift3 38s ease-in-out infinite;
			}
			.aurora .a4 {
				width: 300px;
				height: 300px;
				top: 52%;
				left: 30%;
				background: radial-gradient(
					circle at 50% 50%,
					rgba(255, 143, 192, 0.22),
					rgba(255, 143, 192, 0) 68%
				);
				animation: drift1 44s ease-in-out infinite reverse;
			}

			@keyframes drift1 {
				0%,
				100% {
					transform: translate(0, 0) scale(1);
					opacity: 0.5;
				}
				33% {
					transform: translate(40px, 60px) scale(1.15);
					opacity: 0.72;
				}
				66% {
					transform: translate(-30px, 30px) scale(0.95);
					opacity: 0.42;
				}
			}
			@keyframes drift2 {
				0%,
				100% {
					transform: translate(0, 0) scale(1);
					opacity: 0.46;
				}
				40% {
					transform: translate(-50px, 40px) scale(1.12);
					opacity: 0.66;
				}
				70% {
					transform: translate(20px, -40px) scale(0.92);
					opacity: 0.4;
				}
			}
			@keyframes drift3 {
				0%,
				100% {
					transform: translate(0, 0) scale(1);
					opacity: 0.52;
				}
				50% {
					transform: translate(50px, -50px) scale(1.18);
					opacity: 0.7;
				}
			}

			/* subtle vignette so center text stays calm */
			.vignette {
				position: absolute;
				inset: 0;
				z-index: 1;
				pointer-events: none;
				background:
					radial-gradient(120% 80% at 50% 0%, rgba(5, 5, 5, 0) 40%, rgba(5, 5, 5, 0.55) 100%),
					radial-gradient(120% 90% at 50% 100%, rgba(5, 5, 5, 0) 40%, rgba(5, 5, 5, 0.6) 100%);
			}

			/* ============ iOS STATUS BAR ============ */
			.statusbar {
				position: relative;
				z-index: 10;
				height: 50px;
				flex-shrink: 0;
				display: flex;
				align-items: flex-end;
				justify-content: space-between;
				padding: 0 26px 9px;
				font-size: 14px;
				font-weight: 600;
				letter-spacing: 0.3px;
				color: var(--text);
			}
			.statusbar .time {
				font-variant-numeric: tabular-nums;
			}
			.statusbar .right {
				display: flex;
				align-items: center;
				gap: 7px;
			}
			.signal {
				display: flex;
				align-items: flex-end;
				gap: 2px;
				height: 11px;
			}
			.signal i {
				width: 3px;
				background: var(--text);
				border-radius: 1px;
				display: block;
			}
			.signal i:nth-child(1) {
				height: 4px;
			}
			.signal i:nth-child(2) {
				height: 6px;
			}
			.signal i:nth-child(3) {
				height: 8px;
			}
			.signal i:nth-child(4) {
				height: 11px;
			}
			.battery {
				width: 24px;
				height: 12px;
				border: 1.4px solid rgba(244, 244, 246, 0.65);
				border-radius: 3.5px;
				position: relative;
				padding: 1.5px;
			}
			.battery::after {
				content: '';
				position: absolute;
				right: -3px;
				top: 3.5px;
				width: 2px;
				height: 4px;
				background: rgba(244, 244, 246, 0.55);
				border-radius: 0 1px 1px 0;
			}
			.battery span {
				display: block;
				height: 100%;
				width: 78%;
				background: var(--text);
				border-radius: 1.5px;
			}

			/* ============ GLASS TOP BAR ============ */
			.topbar {
				position: relative;
				z-index: 9;
				flex-shrink: 0;
				height: 58px;
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 0 16px;
				background: linear-gradient(180deg, rgba(20, 20, 24, 0.66), rgba(12, 12, 15, 0.5));
				backdrop-filter: blur(22px) saturate(140%);
				-webkit-backdrop-filter: blur(22px) saturate(140%);
				border-bottom: 1px solid rgba(255, 255, 255, 0.05);
				box-shadow:
					inset 0 1px 0 var(--glass-highlight),
					0 6px 24px rgba(0, 0, 0, 0.35);
			}

			.icon-btn {
				width: 40px;
				height: 40px;
				display: flex;
				align-items: center;
				justify-content: center;
				border-radius: 12px;
				border: 1px solid var(--glass-stroke);
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.015));
				box-shadow:
					inset 0 1px 0 rgba(255, 255, 255, 0.1),
					0 2px 8px rgba(0, 0, 0, 0.3);
				color: var(--text-dim);
				cursor: pointer;
				transition:
					transform 0.14s ease,
					box-shadow 0.2s ease,
					background 0.2s ease;
			}
			.icon-btn:hover {
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
				box-shadow:
					inset 0 1px 0 rgba(255, 255, 255, 0.16),
					inset 0 0 14px rgba(255, 143, 192, 0.08),
					0 2px 10px rgba(0, 0, 0, 0.35);
			}
			.icon-btn:active {
				transform: scale(0.92);
			}
			.icon-btn svg {
				width: 20px;
				height: 20px;
			}

			.brand {
				display: flex;
				align-items: center;
				gap: 9px;
				font-size: 17px;
				font-weight: 600;
				letter-spacing: 0.2px;
			}
			.brand .dot {
				width: 9px;
				height: 9px;
				border-radius: 50%;
				background: var(--magenta-bright);
				box-shadow:
					0 0 8px 1px rgba(255, 77, 148, 0.9),
					0 0 16px 3px rgba(236, 45, 120, 0.55);
				animation: pulse 3.2s ease-in-out infinite;
			}
			@keyframes pulse {
				0%,
				100% {
					box-shadow:
						0 0 8px 1px rgba(255, 77, 148, 0.85),
						0 0 16px 3px rgba(236, 45, 120, 0.5);
				}
				50% {
					box-shadow:
						0 0 11px 2px rgba(255, 77, 148, 1),
						0 0 24px 5px rgba(236, 45, 120, 0.7);
				}
			}

			/* slim model pill */
			.model-pill {
				display: flex;
				align-items: center;
				gap: 5px;
				height: 30px;
				padding: 0 11px;
				border-radius: 15px;
				font-size: 12.5px;
				font-weight: 550;
				letter-spacing: 0.2px;
				color: var(--text-dim);
				border: 1px solid var(--glass-stroke);
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
				box-shadow:
					inset 0 1px 0 rgba(255, 255, 255, 0.12),
					0 2px 8px rgba(0, 0, 0, 0.3);
				cursor: pointer;
				transition:
					transform 0.14s ease,
					box-shadow 0.2s ease;
			}
			.model-pill:active {
				transform: scale(0.95);
			}
			.model-pill .chev {
				width: 12px;
				height: 12px;
				opacity: 0.6;
				margin-left: 1px;
			}

			/* ============ CONVERSATION ============ */
			.convo {
				position: relative;
				z-index: 5;
				flex: 1;
				overflow-y: auto;
				padding: 22px 18px 14px;
				display: flex;
				flex-direction: column;
				gap: 22px;
			}
			.convo::-webkit-scrollbar {
				width: 0;
			}

			/* operator (user) glass pill */
			.msg-user {
				align-self: flex-end;
				max-width: 78%;
			}
			.bubble-user {
				padding: 11px 15px;
				border-radius: 20px 20px 6px 20px;
				font-size: 15px;
				line-height: 1.45;
				color: var(--text);
				background: linear-gradient(180deg, rgba(46, 46, 52, 0.72), rgba(30, 30, 35, 0.62));
				backdrop-filter: blur(14px) saturate(130%);
				-webkit-backdrop-filter: blur(14px) saturate(130%);
				border: 1px solid rgba(255, 255, 255, 0.07);
				box-shadow:
					inset 0 1px 0 rgba(255, 255, 255, 0.13),
					0 6px 18px rgba(0, 0, 0, 0.42),
					0 1px 3px rgba(0, 0, 0, 0.3);
			}

			/* Sully reply */
			.msg-sully {
				align-self: flex-start;
				max-width: 90%;
				display: flex;
				flex-direction: column;
				gap: 9px;
			}
			.nametag {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				font-size: 12.5px;
				font-weight: 600;
				letter-spacing: 0.3px;
				color: var(--magenta-soft);
			}
			.nametag .nt-dot {
				width: 7px;
				height: 7px;
				border-radius: 50%;
				background: var(--magenta-bright);
				box-shadow: 0 0 7px 1px rgba(255, 77, 148, 0.85);
			}
			.sully-text {
				font-size: 15.5px;
				line-height: 1.55;
				color: var(--text-dim);
				padding: 12px 15px;
				border-radius: 4px 16px 16px 16px;
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.012));
				border: 1px solid rgba(255, 255, 255, 0.045);
				box-shadow:
					inset 0 1px 0 rgba(255, 255, 255, 0.06),
					0 2px 12px rgba(0, 0, 0, 0.22);
			}

			/* Sully action buttons row */
			.actions {
				display: flex;
				align-items: center;
				gap: 8px;
				padding-left: 2px;
			}
			.action-btn {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				height: 30px;
				padding: 0 11px;
				border-radius: 10px;
				font-size: 12px;
				font-weight: 550;
				letter-spacing: 0.2px;
				color: var(--text-muted);
				border: 1px solid var(--glass-stroke);
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.012));
				box-shadow:
					inset 0 1px 0 rgba(255, 255, 255, 0.1),
					0 2px 6px rgba(0, 0, 0, 0.28);
				cursor: pointer;
				transition:
					transform 0.14s ease,
					box-shadow 0.2s ease,
					color 0.2s ease;
			}
			.action-btn svg {
				width: 14px;
				height: 14px;
				opacity: 0.85;
			}
			.action-btn:hover {
				color: var(--text-dim);
				box-shadow:
					inset 0 1px 0 rgba(255, 255, 255, 0.16),
					inset 0 0 12px rgba(255, 143, 192, 0.1),
					0 2px 8px rgba(0, 0, 0, 0.3);
			}
			.action-btn:active {
				transform: scale(0.95);
			}

			/* ============ COMPOSER (GLASS PILL) ============ */
			.composer-wrap {
				position: relative;
				z-index: 8;
				flex-shrink: 0;
				padding: 8px 14px calc(10px + env(safe-area-inset-bottom));
			}
			.composer {
				border-radius: 26px;
				padding: 12px 12px 10px;
				background: linear-gradient(180deg, rgba(22, 22, 26, 0.72), rgba(14, 14, 17, 0.62));
				backdrop-filter: blur(26px) saturate(150%);
				-webkit-backdrop-filter: blur(26px) saturate(150%);
				border: 1px solid rgba(255, 255, 255, 0.07);
				box-shadow:
					inset 0 1px 0 var(--glass-highlight),
					0 -2px 10px rgba(0, 0, 0, 0.25),
					0 10px 34px rgba(0, 0, 0, 0.5);
			}

			.composer-input {
				width: 100%;
				height: 35px;
				line-height: 21px;
				resize: none;
				border: none;
				outline: none;
				background: transparent;
				color: var(--text);
				font-family: inherit;
				font-size: 15.5px;
				padding: 7px 8px 6px;
				overflow: hidden;
			}
			.composer-input::placeholder {
				color: var(--text-muted);
			}

			.controls {
				display: flex;
				align-items: center;
				justify-content: space-between;
				margin-top: 6px;
				gap: 8px;
			}
			.controls-left {
				display: flex;
				align-items: center;
				gap: 8px;
			}
			.controls-right {
				display: flex;
				align-items: center;
				gap: 9px;
			}

			/* shared round soft-glass control */
			.ctrl {
				width: 38px;
				height: 38px;
				display: flex;
				align-items: center;
				justify-content: center;
				border-radius: 50%;
				border: 1px solid var(--glass-stroke);
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.018));
				box-shadow:
					inset 0 1px 0 rgba(255, 255, 255, 0.13),
					0 2px 9px rgba(0, 0, 0, 0.35);
				color: var(--text-dim);
				cursor: pointer;
				flex-shrink: 0;
				transition:
					transform 0.14s ease,
					box-shadow 0.22s ease,
					background 0.22s ease;
			}
			.ctrl svg {
				width: 19px;
				height: 19px;
			}
			.ctrl:hover {
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.03));
				box-shadow:
					inset 0 1px 0 rgba(255, 255, 255, 0.18),
					inset 0 0 16px rgba(255, 143, 192, 0.12),
					0 2px 11px rgba(0, 0, 0, 0.4);
			}
			.ctrl:active {
				transform: scale(0.92);
			}

			.ctrl.close {
				color: var(--text-muted);
			}

			/* revealed pill-style actions (text + icon) */
			.reveal {
				display: flex;
				align-items: center;
				gap: 8px;
				animation: slideFade 0.32s cubic-bezier(0.22, 1, 0.36, 1);
			}
			@keyframes slideFade {
				from {
					opacity: 0;
					transform: translateX(-12px);
				}
				to {
					opacity: 1;
					transform: translateX(0);
				}
			}
			.pill-action {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				height: 38px;
				padding: 0 13px;
				border-radius: 19px;
				font-size: 13px;
				font-weight: 550;
				color: var(--text-dim);
				border: 1px solid var(--glass-stroke);
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.018));
				box-shadow:
					inset 0 1px 0 rgba(255, 255, 255, 0.13),
					0 2px 9px rgba(0, 0, 0, 0.35);
				cursor: pointer;
				transition:
					transform 0.14s ease,
					box-shadow 0.22s ease,
					background 0.22s ease;
			}
			.pill-action svg {
				width: 17px;
				height: 17px;
				opacity: 0.85;
			}
			.pill-action:hover {
				background: linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.03));
				box-shadow:
					inset 0 1px 0 rgba(255, 255, 255, 0.18),
					inset 0 0 14px rgba(255, 143, 192, 0.1),
					0 2px 11px rgba(0, 0, 0, 0.4);
			}
			.pill-action:active {
				transform: scale(0.95);
			}

			/* talkback (headphones) */
			.ctrl.talkback svg {
				width: 20px;
				height: 20px;
			}

			/* VOICE-MODE button — filled magenta with bloom */
			.voice-btn {
				width: 46px;
				height: 46px;
				display: flex;
				align-items: center;
				justify-content: center;
				border-radius: 50%;
				border: 1px solid rgba(255, 143, 192, 0.5);
				background: radial-gradient(
					circle at 50% 28%,
					var(--magenta-bright),
					var(--magenta) 55%,
					var(--magenta-deep) 100%
				);
				color: #fff;
				cursor: pointer;
				flex-shrink: 0;
				box-shadow:
					inset 0 1px 1px rgba(255, 255, 255, 0.4),
					inset 0 -2px 6px rgba(120, 0, 55, 0.5),
					0 0 0 4px rgba(236, 45, 120, 0.12),
					0 4px 18px rgba(236, 45, 120, 0.55),
					0 0 28px rgba(255, 77, 148, 0.45);
				transition:
					transform 0.14s ease,
					box-shadow 0.25s ease;
				animation: bloom 3.4s ease-in-out infinite;
			}
			.voice-btn svg {
				width: 22px;
				height: 22px;
			}
			.voice-btn:active {
				transform: scale(0.94);
			}
			@keyframes bloom {
				0%,
				100% {
					box-shadow:
						inset 0 1px 1px rgba(255, 255, 255, 0.4),
						inset 0 -2px 6px rgba(120, 0, 55, 0.5),
						0 0 0 4px rgba(236, 45, 120, 0.1),
						0 4px 18px rgba(236, 45, 120, 0.5),
						0 0 26px rgba(255, 77, 148, 0.4);
				}
				50% {
					box-shadow:
						inset 0 1px 1px rgba(255, 255, 255, 0.45),
						inset 0 -2px 6px rgba(120, 0, 55, 0.5),
						0 0 0 5px rgba(236, 45, 120, 0.16),
						0 4px 22px rgba(236, 45, 120, 0.62),
						0 0 36px rgba(255, 77, 148, 0.58);
				}
			}

			/* home indicator */
			.home-indicator {
				position: relative;
				z-index: 10;
				flex-shrink: 0;
				display: flex;
				justify-content: center;
				padding-bottom: 8px;
			}
			.home-indicator span {
				width: 134px;
				height: 5px;
				border-radius: 3px;
				background: rgba(244, 244, 246, 0.85);
			}
		</style>
	</head>
	<body>
		<div class="phone">
			<!-- LIVING AURORA -->
			<div class="aurora">
				<span class="a1"></span>
				<span class="a2"></span>
				<span class="a3"></span>
				<span class="a4"></span>
			</div>
			<div class="vignette"></div>

			<!-- STATUS BAR -->
			<div class="statusbar">
				<div class="time">9:41</div>
				<div class="right">
					<div class="signal"><i></i><i></i><i></i><i></i></div>
					<svg width="17" height="12" viewBox="0 0 17 12" fill="none">
						<path
							d="M8.5 2.2C10.7 2.2 12.7 3 14.2 4.5L15.4 3.2C13.6 1.4 11.2 0.4 8.5 0.4S3.4 1.4 1.6 3.2L2.8 4.5C4.3 3 6.3 2.2 8.5 2.2Z"
							fill="#f4f4f6"
							opacity="0.95"
						/>
						<path
							d="M8.5 5.6C9.7 5.6 10.8 6.1 11.6 6.9L12.8 5.7C11.7 4.6 10.2 3.9 8.5 3.9S5.3 4.6 4.2 5.7L5.4 6.9C6.2 6.1 7.3 5.6 8.5 5.6Z"
							fill="#f4f4f6"
							opacity="0.95"
						/>
						<path
							d="M8.5 9C9.1 9 9.7 9.2 10.1 9.7L8.5 11.4L6.9 9.7C7.3 9.2 7.9 9 8.5 9Z"
							fill="#f4f4f6"
							opacity="0.95"
						/>
					</svg>
					<div class="battery"><span></span></div>
				</div>
			</div>

			<!-- GLASS TOP BAR -->
			<header class="topbar">
				<button class="icon-btn" aria-label="Menu">
					<svg
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.8"
						stroke-linecap="round"
					>
						<path d="M4 7h16M4 12h16M4 17h16" />
					</svg>
				</button>
				<div class="brand">
					<span class="dot"></span>
					Sully
				</div>
				<button class="model-pill">
					Opus 4.8
					<svg
						class="chev"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2.2"
						stroke-linecap="round"
						stroke-linejoin="round"
					>
						<path d="M6 9l6 6 6-6" />
					</svg>
				</button>
			</header>

			<!-- CONVERSATION -->
			<main class="convo">
				<!-- operator -->
				<div class="msg-user">
					<div class="bubble-user">what's the plan for today?</div>
				</div>

				<!-- Sully -->
				<div class="msg-sully">
					<div class="nametag"><span class="nt-dot"></span>Sully</div>
					<div class="sully-text">
						Let's keep it simple. What's the one thing that'd make today feel handled?
					</div>
					<div class="actions">
						<button class="action-btn">
							<svg
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="1.7"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<rect x="9" y="9" width="11" height="11" rx="2.4" />
								<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
							</svg>
							Copy
						</button>
						<button class="action-btn">
							<svg
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="1.7"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<path d="M21 12a9 9 0 1 1-2.64-6.36" />
								<path d="M21 3v6h-6" />
							</svg>
							Regen
						</button>
						<button class="action-btn">
							<svg
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="1.7"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<polygon points="6 4 20 12 6 20 6 4" fill="currentColor" stroke="none" />
							</svg>
							Play
						</button>
					</div>
				</div>

				<!-- operator -->
				<div class="msg-user">
					<div class="bubble-user">probably finally shipping the avatar.</div>
				</div>

				<!-- Sully -->
				<div class="msg-sully">
					<div class="nametag"><span class="nt-dot"></span>Sully</div>
					<div class="sully-text">
						Then that's the move. Want me to hand the build to CC while we talk it through?
					</div>
					<div class="actions">
						<button class="action-btn">
							<svg
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="1.7"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<rect x="9" y="9" width="11" height="11" rx="2.4" />
								<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
							</svg>
							Copy
						</button>
						<button class="action-btn">
							<svg
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="1.7"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<path d="M21 12a9 9 0 1 1-2.64-6.36" />
								<path d="M21 3v6h-6" />
							</svg>
							Regen
						</button>
						<button class="action-btn">
							<svg
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="1.7"
								stroke-linecap="round"
								stroke-linejoin="round"
							>
								<polygon points="6 4 20 12 6 20 6 4" fill="currentColor" stroke="none" />
							</svg>
							Play
						</button>
					</div>
				</div>
			</main>

			<!-- COMPOSER -->
			<div class="composer-wrap">
				<div class="composer">
					<textarea class="composer-input" rows="1" placeholder="Talk to Sully…"></textarea>
					<div class="controls">
						<!-- LEFT: revealed state -->
						<div class="controls-left">
							<div class="reveal">
								<button class="ctrl close" aria-label="Close actions">
									<svg
										viewBox="0 0 24 24"
										fill="none"
										stroke="currentColor"
										stroke-width="1.9"
										stroke-linecap="round"
									>
										<path d="M6 6l12 12M18 6L6 18" />
									</svg>
								</button>
								<button class="pill-action">
									<svg
										viewBox="0 0 24 24"
										fill="none"
										stroke="currentColor"
										stroke-width="1.7"
										stroke-linecap="round"
										stroke-linejoin="round"
									>
										<path
											d="M21.44 11.05l-9.19 9.19a5 5 0 0 1-7.07-7.07l9.19-9.19a3.5 3.5 0 0 1 4.95 4.95l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"
										/>
									</svg>
									Attach
								</button>
								<button class="pill-action">
									<svg
										viewBox="0 0 24 24"
										fill="none"
										stroke="currentColor"
										stroke-width="1.7"
										stroke-linecap="round"
										stroke-linejoin="round"
									>
										<rect x="3" y="4" width="18" height="16" rx="2.4" />
										<circle cx="8.5" cy="9.5" r="1.8" />
										<path d="M3 17l5-5 4 4 3-3 6 6" />
									</svg>
									Image-gen
								</button>
							</div>
						</div>

						<!-- RIGHT: talkback + voice mode -->
						<div class="controls-right">
							<button class="ctrl talkback" aria-label="Talkback">
								<svg
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="1.7"
									stroke-linecap="round"
									stroke-linejoin="round"
								>
									<path d="M4 14v-2a8 8 0 0 1 16 0v2" />
									<rect x="3" y="13" width="4" height="7" rx="1.6" />
									<rect x="17" y="13" width="4" height="7" rx="1.6" />
								</svg>
							</button>
							<button class="voice-btn" aria-label="Voice mode">
								<svg
									viewBox="0 0 24 24"
									fill="none"
									stroke="currentColor"
									stroke-width="2"
									stroke-linecap="round"
								>
									<path d="M3 12h0M6.5 8v8M10 5v14M13.5 8v8M17 10v4M20.5 12h0" />
								</svg>
							</button>
						</div>
					</div>
				</div>
			</div>

			<!-- HOME INDICATOR -->
			<div class="home-indicator"><span></span></div>
		</div>
	</body>
</html>
