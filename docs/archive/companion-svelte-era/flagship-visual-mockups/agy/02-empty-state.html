<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>Mockup 02 — Empty State</title>
	<link rel="stylesheet" href="./shared.css">
	<style>
		/* Empty state overrides for premium styling */
		.empty-hero h2 {
			font-family: var(--font-display);
			font-size: 24px;
			font-weight: 500;
			line-height: 1.25;
			margin-bottom: 8px;
			letter-spacing: -0.015em;
			color: var(--t1);
		}
		.empty-hero p {
			font-size: 14px;
			color: var(--t3);
			margin-bottom: 24px;
		}
		.chips {
			display: flex;
			flex-direction: column;
			gap: 10px;
			width: 100%;
			max-width: 310px;
		}
	</style>
</head>
<body>
	<div class="phone-stage">
		<div class="phone-label">AGY — Empty State & Starters (Phase B)</div>
		<div class="phone">
			<div class="app">
				<div class="app-bg"></div>
				<div class="app-root">
					<header class="header quiet">
						<div class="header-left">
							<button class="icon-btn">☰</button>
							<a class="brand" href="#"><div class="brand-mark"></div></a>
						</div>
						<button class="model-chip" type="button"><span class="dot"></span> Auto ▾</button>
						<div class="header-right"><button class="icon-btn">✎</button></div>
					</header>

					<div class="empty-hero">
						<div class="orb-lg"></div>
						<h2>Hey Captain — what's on your mind?</h2>
						<p>Sully's here. Think out loud.</p>
						
						<div class="chips">
							<button type="button" class="chip">What's running? </button>
							<button type="button" class="chip">Summarize today </button>
							<button type="button" class="chip">New thread </button>
							<button type="button" class="chip">Voice mode </button>
						</div>
					</div>

					<div class="composer-wrap">
						<div class="composer">
							<div class="composer-row">
								<button class="icon-btn" type="button">📎</button>
								<textarea class="composer-input" rows="1" placeholder="Talk to Sully…"></textarea>
								<button class="icon-btn" type="button">〰</button>
								<button class="send-fab" type="button">🎤</button>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<span class="badge-note">Suggested starters pre-fill composer on tap</span>
	</div>

	<script>
		const chips = document.querySelectorAll('.chip');
		const composerInput = document.querySelector('.composer-input');
		const sendBtn = document.querySelector('.send-fab');

		chips.forEach(chip => {
			chip.addEventListener('click', () => {
				const text = chip.textContent.trim();
				composerInput.value = text;
				composerInput.focus();
				
				// Optional: visually highlight the send button as ready
				sendBtn.innerHTML = '▲';
				sendBtn.style.background = 'var(--grad)';
			});
		});

		composerInput.addEventListener('input', () => {
			if (composerInput.value.trim().length > 0) {
				sendBtn.innerHTML = '▲';
			} else {
				sendBtn.innerHTML = '🎤';
			}
		});
	</script>
</body>
</html>
