<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>Mockup 03 — Sidebar</title>
	<link rel="stylesheet" href="./shared.css">
	<style>
		.drawer-layout {
			display: flex;
			height: 100%;
			position: relative;
		}
		.drawer {
			width: 82%;
			max-width: 300px;
			background: rgba(11, 12, 16, 0.82);
			backdrop-filter: blur(30px);
			-webkit-backdrop-filter: blur(30px);
			border-right: 1px solid var(--line);
			display: flex;
			flex-direction: column;
			padding-top: calc(var(--safe-top) + 8px);
			z-index: 10;
			position: relative;
			box-shadow: 10px 0 40px rgba(0, 0, 0, 0.3);
		}
		.drawer-head {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 10px 16px 14px;
		}
		.new-btn {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			height: 32px;
			padding: 0 12px;
			border-radius: var(--r-pill);
			border: 1px solid var(--live-line);
			background: var(--live-bg);
			color: var(--accent-soft);
			font-family: var(--font-body);
			font-size: 12.5px;
			font-weight: var(--weight-semibold);
			cursor: pointer;
			transition:
				background-color var(--dur-fast) var(--ease-standard),
				transform var(--dur-fast) var(--ease-standard);
		}
		.new-btn:active {
			transform: scale(0.95);
		}
		.search {
			margin: 0 14px 14px;
			padding: 10px 12px;
			border-radius: var(--r-md);
			border: 1px solid var(--line2);
			background: rgba(255, 255, 255, 0.02);
			color: var(--t3);
			font-size: 13.5px;
			display: flex;
			align-items: center;
			gap: 8px;
			cursor: text;
			transition: border-color var(--dur-fast) var(--ease-standard);
		}
		.search:hover {
			border-color: var(--line3);
		}
		.section-label {
			padding: 12px 18px 6px;
			font-family: var(--font-mono);
			font-size: 9.5px;
			font-weight: var(--weight-bold);
			letter-spacing: 0.1em;
			text-transform: uppercase;
			color: var(--t4);
		}
		.thread-list {
			display: flex;
			flex-direction: column;
			gap: 2px;
			overflow-y: auto;
			padding: 0 8px;
		}
		.thread {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 10px 12px;
			border-radius: var(--r-md);
			font-size: 14.5px;
			color: var(--t2);
			text-decoration: none;
			cursor: pointer;
			border: 1px solid transparent;
			transition:
				background-color var(--dur-fast) var(--ease-standard),
				color var(--dur-fast) var(--ease-standard);
		}
		.thread:hover {
			background: rgba(255, 255, 255, 0.03);
			color: var(--t1);
		}
		.thread.active {
			background: var(--live-bg);
			border-color: var(--live-line);
			color: var(--t1);
			font-weight: var(--weight-medium);
		}
		.thread .count {
			margin-left: auto;
			font-family: var(--font-mono);
			font-size: 10px;
			color: var(--t3);
			background: rgba(255, 255, 255, 0.05);
			padding: 2px 8px;
			border-radius: var(--r-pill);
		}
		.task-box {
			margin: 0 14px 10px;
			padding: 11px 14px;
			border-radius: var(--r-md);
			border: 1px solid var(--amber-line);
			background: var(--amber-bg);
			display: flex;
			align-items: center;
			gap: 10px;
			font-size: 13px;
			color: var(--t1);
			font-weight: var(--weight-medium);
			box-shadow: 0 4px 12px rgba(251, 191, 36, 0.04);
		}
		.task-box .pulse {
			width: 8px;
			height: 8px;
			border-radius: 50%;
			background: var(--amber);
			box-shadow: 0 0 10px rgba(251, 191, 36, 0.6);
			animation: amber-glow 1.5s infinite alternate;
			flex-shrink: 0;
		}
		@keyframes amber-glow {
			0% { transform: scale(1); opacity: 0.6; }
			100% { transform: scale(1.25); opacity: 1; box-shadow: 0 0 14px rgba(251, 191, 36, 0.9); }
		}
		.drawer-foot {
			margin-top: auto;
			padding: 16px;
			border-top: 1px solid var(--line);
			background: rgba(11, 12, 16, 0.2);
		}
		.profile-chip {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 10px 12px;
			border-radius: var(--r-md);
			border: 1px solid var(--line2);
			background: rgba(255, 255, 255, 0.02);
			font-size: 13.5px;
			font-weight: var(--weight-medium);
			color: var(--t2);
			cursor: pointer;
			transition:
				background-color var(--dur-fast) var(--ease-standard),
				border-color var(--dur-fast) var(--ease-standard);
		}
		.profile-chip:hover {
			background: rgba(255, 255, 255, 0.05);
			border-color: var(--line3);
			color: var(--t1);
		}
		.chat-dim {
			flex: 1;
			background: rgba(0, 0, 0, 0.4);
			backdrop-filter: blur(1.5px);
			-webkit-backdrop-filter: blur(1.5px);
			transition: opacity var(--dur-med) var(--ease-standard);
		}
	</style>
</head>
<body>
	<div class="phone-stage">
		<div class="phone-label">AGY — Restructured Sidebar (Phase A)</div>
		<div class="phone">
			<div class="drawer-layout">
				<aside class="drawer">
					<div class="drawer-head">
						<div class="brand">
							<div class="brand-mark"></div>
							<span class="brand-name">Sully</span>
						</div>
						<button class="new-btn" type="button">+ New</button>
					</div>
					
					<div class="search">
						<span style="opacity: 0.5;">🔍</span>
						<span>Search…</span>
					</div>

					<div class="section-label">Active Tasks</div>
					<div class="task-box">
						<span class="pulse"></span>
						<span style="font-family: var(--font-mono); font-size: 11.5px; color: var(--amber);">CC</span>
						<span>PRO-193 run sheet</span>
					</div>

					<div class="section-label">Pinned</div>
					<div class="thread-list">
						<div class="thread active">
							<span>🌙</span>
							<span>The Den</span>
							<span class="count">90</span>
						</div>
					</div>

					<div class="section-label">Recent</div>
					<div class="thread-list" style="flex: 1;">
						<div class="thread">
							<span>#</span>
							<span>Cheapest Mac Mini for LLM</span>
							<span class="count">28</span>
						</div>
						<div class="thread">
							<span>#</span>
							<span>Treehouse wiring plan</span>
							<span class="count">12</span>
						</div>
						<div class="thread">
							<span>#</span>
							<span>Voice stack tuning</span>
							<span class="count">7</span>
						</div>
					</div>

					<div class="drawer-foot">
						<div class="profile-chip">
							<div class="brand-mark" style="width:20px;height:20px;box-shadow:none"></div>
							<span>Settings & context</span>
						</div>
					</div>
				</aside>
				
				<div class="chat-dim"></div>
			</div>
		</div>
		<span class="badge-note">Clean layout • Dev details removed • amber task pulses</span>
	</div>
</body>
</html>
