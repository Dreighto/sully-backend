<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>Mockup 08 — Voice (Gemini-inspired)</title>
	<link rel="stylesheet" href="./shared.css">
	<style>
		/* Gemini Live borrow: atmospheric fullscreen, kinetic orb, waveform pill,
		   captions as overlay not default, minimal top chrome. Indigo not Google blue. */
		.live-app {
			position: relative;
			min-height: 100%;
			background: var(--bg0);
			overflow: hidden;
		}
		.live-app::before,
		.live-app::after {
			content: '';
			position: absolute;
			border-radius: 50%;
			pointer-events: none;
			filter: blur(60px);
			opacity: 0.55;
			transition: transform 1.2s var(--ease-standard), opacity 0.8s;
		}
		.live-app::before {
			width: 280px;
			height: 280px;
			top: 18%;
			left: 50%;
			transform: translateX(-50%);
			background: radial-gradient(circle, rgba(124, 132, 232, 0.45), transparent 70%);
		}
		.live-app::after {
			width: 340px;
			height: 200px;
			bottom: 0;
			left: 50%;
			transform: translateX(-50%);
			background: radial-gradient(ellipse, rgba(94, 106, 210, 0.35), transparent 72%);
		}
		.live-top {
			position: relative;
			z-index: 2;
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: calc(var(--safe-top) + 10px) 16px 8px;
		}
		.live-title {
			font-size: 15px;
			font-weight: 500;
			color: var(--t2);
		}
		.live-top-actions {
			display: flex;
			gap: 4px;
		}
		.live-stage {
			position: relative;
			z-index: 1;
			flex: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			padding: 20px 24px 120px;
			gap: 28px;
		}
		.orb-stack {
			position: relative;
			width: 200px;
			height: 200px;
			display: flex;
			align-items: center;
			justify-content: center;
		}
		.orb-ring {
			position: absolute;
			inset: -12px;
			border-radius: 50%;
			border: 1px solid rgba(124, 132, 232, 0.2);
			animation: breathe 3.6s ease-in-out infinite;
		}
		.orb-ring.r2 {
			inset: -28px;
			opacity: 0.45;
			animation-delay: 0.6s;
		}
		.orb-core {
			width: 148px;
			height: 148px;
			border-radius: 50%;
			background: var(--orb-grad);
			box-shadow:
				0 0 0 1px rgba(255, 255, 255, 0.08),
				0 0 48px rgba(124, 132, 232, 0.35),
				0 24px 64px rgba(0, 0, 0, 0.45);
		}
		.orb-core.listening {
			animation: pulse-live 1.4s ease-in-out infinite;
		}
		.orb-core.speaking {
			animation: pulse-speak 0.9s ease-in-out infinite;
		}
		.live-caption {
			max-width: 300px;
			text-align: center;
			font-family: var(--font-display);
			font-size: 22px;
			line-height: 1.45;
			color: var(--t1);
			min-height: 3.2em;
		}
		.live-caption.dim {
			font-family: var(--font-body);
			font-size: 14px;
			color: var(--t4);
		}
		.live-dock {
			position: absolute;
			left: 16px;
			right: 16px;
			bottom: calc(var(--safe-bottom) + 12px);
			z-index: 3;
		}
		.wave-pill {
			display: flex;
			align-items: center;
			gap: 12px;
			padding: 10px 14px 10px 12px;
			border-radius: var(--r-pill);
			background: rgba(20, 22, 28, 0.82);
			border: 1px solid var(--glass-border);
			backdrop-filter: blur(20px);
			box-shadow: var(--shadow-float);
		}
		.wave-pill .dock-btn {
			width: 40px;
			height: 40px;
			border-radius: 50%;
			border: none;
			background: rgba(255, 255, 255, 0.06);
			color: var(--t2);
			font-size: 18px;
			flex-shrink: 0;
		}
		.wave-pill .dock-btn.active {
			background: rgba(124, 132, 232, 0.18);
			color: var(--accent-soft);
		}
		.wave-bars {
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 4px;
			height: 36px;
		}
		.wave-bars span {
			width: 4px;
			border-radius: 4px;
			background: linear-gradient(180deg, var(--accent-soft), var(--accent));
			animation: bar 1.1s ease-in-out infinite;
		}
		.wave-bars span:nth-child(1) { height: 12px; animation-delay: 0s; }
		.wave-bars span:nth-child(2) { height: 22px; animation-delay: 0.12s; }
		.wave-bars span:nth-child(3) { height: 30px; animation-delay: 0.24s; }
		.wave-bars span:nth-child(4) { height: 18px; animation-delay: 0.08s; }
		.wave-bars span:nth-child(5) { height: 26px; animation-delay: 0.2s; }
		.wave-bars span:nth-child(6) { height: 14px; animation-delay: 0.16s; }
		.wave-bars.idle span {
			animation: none;
			height: 6px;
			opacity: 0.35;
		}
		.state-tabs {
			position: relative;
			z-index: 2;
			display: flex;
			gap: 6px;
			justify-content: center;
			padding: 8px 16px 0;
			flex-wrap: wrap;
		}
		.state-tab {
			padding: 6px 12px;
			border-radius: var(--r-pill);
			border: 1px solid var(--line2);
			background: rgba(255,255,255,0.04);
			color: var(--t3);
			font-size: 11px;
		}
		.state-tab.on {
			border-color: var(--live-line);
			background: var(--live-bg);
			color: var(--t1);
		}
		.note {
			position: relative;
			z-index: 2;
			padding: 0 20px 12px;
			font-size: 11px;
			color: var(--t4);
			text-align: center;
			line-height: 1.45;
		}
		@keyframes breathe {
			0%, 100% { transform: scale(1); opacity: 0.5; }
			50% { transform: scale(1.04); opacity: 0.85; }
		}
		@keyframes pulse-live {
			0%, 100% { transform: scale(1); box-shadow: 0 0 48px rgba(124,132,232,0.35); }
			50% { transform: scale(1.03); box-shadow: 0 0 64px rgba(124,132,232,0.55); }
		}
		@keyframes pulse-speak {
			0%, 100% { transform: scale(1); }
			33% { transform: scale(1.02); }
			66% { transform: scale(0.99); }
		}
		@keyframes bar {
			0%, 100% { transform: scaleY(0.45); opacity: 0.55; }
			50% { transform: scaleY(1); opacity: 1; }
		}
	</style>
</head>
<body>
	<div class="phone-stage">
		<div class="phone-label">Direction — Gemini Live feel, Sully Indigo</div>
		<div class="phone">
			<div class="app live-app" id="root">
				<div class="live-top">
					<span class="live-title" id="title">Live with Sully</span>
					<div class="live-top-actions">
						<button class="icon-btn" type="button" title="Captions">CC</button>
						<button class="icon-btn" type="button" title="Close">✕</button>
					</div>
				</div>

				<div class="state-tabs">
					<button class="state-tab on" data-state="idle" type="button">Idle</button>
					<button class="state-tab" data-state="listening" type="button">Listening</button>
					<button class="state-tab" data-state="speaking" type="button">Speaking</button>
				</div>

				<div class="live-stage">
					<div class="orb-stack">
						<div class="orb-ring"></div>
						<div class="orb-ring r2"></div>
						<div class="orb-core" id="orb"></div>
					</div>
					<p class="live-caption" id="hero">Hey Captain — talk whenever you're ready.</p>
					<p class="live-caption dim" id="sub" style="display:none"></p>
				</div>

				<p class="note">Borrow: atmospheric glow · kinetic orb · waveform dock · captions optional · no big mic FAB</p>

				<div class="live-dock">
					<div class="wave-pill">
						<button class="dock-btn" type="button" title="Keyboard — exit to chat">⌨</button>
						<div class="wave-bars idle" id="bars">
							<span></span><span></span><span></span><span></span><span></span><span></span>
						</div>
						<button class="dock-btn active" type="button" title="Mute">🎤</button>
					</div>
				</div>
			</div>
		</div>
		<span class="badge-note">Not a pixel clone — same calm energy, Sully identity, our stack</span>
	</div>
	<script>
		const copy = {
			idle: { hero: "Hey Captain — talk whenever you're ready.", sub: '', orb: '', bars: 'idle' },
			listening: { hero: '', sub: 'check what\'s running on the box', orb: 'listening', bars: '' },
			speaking: { hero: 'Three services are up. Nothing\'s stuck.', sub: '', orb: 'speaking', bars: '' }
		};
		document.querySelectorAll('.state-tab').forEach((tab) => {
			tab.addEventListener('click', () => {
				const s = tab.dataset.state;
				document.querySelectorAll('.state-tab').forEach((t) => t.classList.toggle('on', t === tab));
				const c = copy[s];
				const hero = document.getElementById('hero');
				const sub = document.getElementById('sub');
				const orb = document.getElementById('orb');
				const bars = document.getElementById('bars');
				hero.textContent = c.hero;
				hero.style.display = c.hero ? 'block' : 'none';
				sub.textContent = c.sub;
				sub.style.display = c.sub ? 'block' : 'none';
				orb.className = 'orb-core ' + (c.orb || '');
				bars.className = 'wave-bars ' + (c.bars || (s === 'idle' ? 'idle' : ''));
			});
		});
	</script>
</body>
</html>
