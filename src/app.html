<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />

		<!-- viewport-fit=cover is REQUIRED for env(safe-area-inset-*) to resolve to
		     non-zero values on iPhone. Without it, every safe-area inset reads as 0px
		     and the bottom nav gets covered by the home indicator. -->
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
		/>

		<!-- iOS PWA standalone-mode meta tags. theme-color tints the iOS status bar; -->
		<!-- black-translucent makes the page extend under the status bar (combine with -->
		<!-- safe-area-inset-top padding on the top app bar). -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Companion" />
		<meta name="theme-color" content="#0d1117" />
		<meta name="text-scale" content="scale" />

		<!-- iOS still uses apple-touch-icon alongside the manifest's icons array. -->
		<!-- 180x180 PNG, served from /static. -->
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<!-- Manifest link emitted from +layout.svelte so it can pick up
		     kit.paths.base ('/companion') at render time. -->
		<!-- PNG favicon = the COMP companion logo. (Old SVG mark link removed so the
		     new PNG wins — browsers prefer an SVG icon over PNG when both are present.) -->
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />

		<!-- iOS launch splash screens. iOS Safari uses these as the loading
		     image when the PWA opens from the home screen. Each link MUST
		     have a media query that matches the device's CSS-pixel viewport,
		     and the image dimensions must match the physical pixels (CSS px
		     × device-pixel-ratio). Without these the launch shows a blank
		     white flash instead of a branded splash. Generated by
		     scripts/gen-app-icons.sh — re-run after any logo change. -->
		<link
			rel="apple-touch-startup-image"
			href="%sveltekit.assets%/ios/splash-750x1334.png"
			media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)"
		/>
		<link
			rel="apple-touch-startup-image"
			href="%sveltekit.assets%/ios/splash-1242x2208.png"
			media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)"
		/>
		<link
			rel="apple-touch-startup-image"
			href="%sveltekit.assets%/ios/splash-1125x2436.png"
			media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)"
		/>
		<link
			rel="apple-touch-startup-image"
			href="%sveltekit.assets%/ios/splash-828x1792.png"
			media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)"
		/>
		<link
			rel="apple-touch-startup-image"
			href="%sveltekit.assets%/ios/splash-1242x2688.png"
			media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)"
		/>
		<link
			rel="apple-touch-startup-image"
			href="%sveltekit.assets%/ios/splash-1080x2340.png"
			media="(device-width: 360px) and (device-height: 780px) and (-webkit-device-pixel-ratio: 3)"
		/>
		<link
			rel="apple-touch-startup-image"
			href="%sveltekit.assets%/ios/splash-1170x2532.png"
			media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
		/>
		<link
			rel="apple-touch-startup-image"
			href="%sveltekit.assets%/ios/splash-1284x2778.png"
			media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)"
		/>
		<link
			rel="apple-touch-startup-image"
			href="%sveltekit.assets%/ios/splash-1179x2556.png"
			media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)"
		/>
		<link
			rel="apple-touch-startup-image"
			href="%sveltekit.assets%/ios/splash-1290x2796.png"
			media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
		/>
		<link
			rel="apple-touch-startup-image"
			href="%sveltekit.assets%/ios/splash-1206x2622.png"
			media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)"
		/>
		<link
			rel="apple-touch-startup-image"
			href="%sveltekit.assets%/ios/splash-1320x2868.png"
			media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)"
		/>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400;1,600&family=Inter:ital,opsz,wght@0,14..32,200..700;1,14..32,200..700&display=swap"
			rel="stylesheet"
		/>

		<!-- Eruda — touch-friendly mobile DevTools console for the real-iPhone
		     debugging path (no Safari Web Inspector on Linux). Activates when
		     the URL carries ?debug=1 OR localStorage.eruda is set, either of
		     which the operator can toggle from the phone without redeploying.
		     ?debug=0 clears the sticky flag. Inline + on-demand from jsdelivr,
		     so production users see 0 bytes when off. -->
		<script>
			(function () {
				try {
					var qs = location.search;
					if (qs.indexOf('debug=0') !== -1) localStorage.removeItem('eruda');
					else if (qs.indexOf('debug=1') !== -1) localStorage.setItem('eruda', '1');
					if (localStorage.getItem('eruda') !== '1') return;
					var s = document.createElement('script');
					s.src = 'https://cdn.jsdelivr.net/npm/eruda';
					s.onload = function () {
						window.eruda && window.eruda.init();
					};
					document.head.appendChild(s);
				} catch (e) {
					/* private mode or blocked storage — silently skip */
				}
			})();
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
