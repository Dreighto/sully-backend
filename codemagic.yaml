# codemagic.yaml — Sully (Dreighto/LogueOS-Companion) iOS thin Capacitor shell
# ---------------------------------------------------------------------------
# BUILD 1 SCOPE: shell + microphone. Proves the app compiles, auto-signs,
# uploads to TestFlight, installs, loads Sully over Tailscale, and can use the
# mic. PUSH (APNs) is intentionally deferred to Build 2 (needs an entitlement +
# bridge code in the remote app) to keep the first build free of push-signing
# risk.
#
# The app is a THIN Capacitor 8 shell: at runtime it loads a REMOTE SvelteKit
# (adapter-node) server via capacitor.config server.url — it does NOT bundle the
# client. Nothing under ios/ is committed; the native project is generated fresh
# every build.
#
# PREREQUISITES (done once in the Codemagic / App Store Connect UI — see
# docs/ios-build-runbook.md):
#   - App Store Connect API key (ID R8SY4X6JM4) wired as a Codemagic *integration*
#     under Team settings, named exactly `LogueOS` (matches the integrations block).
#   - App record for bundle com.dreighto.sully exists in App Store Connect.
#   - This file lives on branch feat/ios-capacitor-shell.
# ---------------------------------------------------------------------------

workflows:
  ios-testflight:
    name: Sully iOS -> TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2          # free-tier hardware (Apple silicon M2)

    # Manual triggers only: no `triggering:` block means it never auto-builds.
    # Press "Start new build" in the Codemagic UI and pick this workflow.

    integrations:
      app_store_connect: LogueOS      # App Store Connect API key integration (key ID R8SY4X6JM4)

    environment:
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"   # Capacitor (CocoaPods) workspace name
        XCODE_SCHEME: "App"                  # Capacitor default scheme name
        BUNDLE_ID: "com.dreighto.sully"
        TEAM_ID: "G3KJW4VXM9"
        # App Store Connect Apple ID for Sully (set 2026-05-30; SKU com.dreighto.sully)
        # (App Store Connect > Apps > Sully > General > App Information > Apple ID).
        # Until then the build still works via the $BUILD_NUMBER fallback below.
        APP_APPLE_ID: "6775013884"
      xcode: latest                     # resolves to 26.4 today (satisfies Capacitor 8's Xcode 26+). `latest` avoids a free-tier version-pin gamble; pin 26.4 once confirmed.
      cocoapods: default
      node: 22

    scripts:
      - name: Install JS dependencies
        script: |
          npm ci

      - name: Create placeholder webDir (app loads remote server.url, not a bundled client)
        script: |
          # Capacitor REQUIRES webDir (www/) to exist with an index.html for
          # `cap add ios` / `cap sync` to succeed. SvelteKit adapter-node emits NO
          # static SPA folder, so we write a tiny stub here (www/ is gitignored).
          # Its contents never render at runtime — capacitor.config server.url
          # overrides them. <head> is required or Capacitor refuses bridge injection.
          mkdir -p www
          cat > www/index.html <<'HTML'
          <!doctype html>
          <html>
            <head><meta charset="utf-8" /><title>Sully</title></head>
            <body>Loading Sully…</body>
          </html>
          HTML

      - name: Generate iOS native project fresh (CocoaPods — Capacitor 8 defaults to SPM)
        script: |
          # --packagemanager CocoaPods is REQUIRED: Capacitor 8 changed the iOS
          # default to Swift Package Manager, which produces no Podfile and no
          # App.xcworkspace. The CocoaPods template restores both, which the
          # pod-install + build-ipa --workspace steps below depend on.
          npx cap add ios --packagemanager CocoaPods

      - name: Patch native config (microphone + export-compliance + iOS-15 floor)
        script: |
          # ios/ is regenerated every build, so re-apply native settings here.
          chmod +x scripts/ci-ios-patch.sh
          ./scripts/ci-ios-patch.sh

      - name: Sync web assets + install pods
        script: |
          # cap sync copies www/ into the native project AND runs `pod install`
          # (so the Podfile iOS-15 floor set by the patch step is honored).
          npx cap sync ios

      - name: Generate + flatten app icon (custom logo)
        script: |
          # ios/ is regenerated each build, so (re)generate the AppIcon set from
          # assets/logo.png here, AFTER cap add/sync. Flattens the 1024 marketing
          # icon's alpha (ITMS-90717). See scripts/ci-ios-icons.sh.
          chmod +x scripts/ci-ios-icons.sh
          ./scripts/ci-ios-icons.sh

      - name: Set up code signing (instrumented)
        script: |
          DBG="$CM_BUILD_DIR/signing-debug.log"; : > "$DBG"
          keychain initialize 2>&1 | tee -a "$DBG"
          # Signing-key resolution. The CERTIFICATE_PRIVATE_KEY that signed the
          # May 30 build vanished from the Codemagic environment, so the old
          # distribution cert is unusable (its private key is gone). We MINT a
          # fresh key + let fetch-signing-files --create register a new
          # distribution certificate from it, then PERSIST the key back to
          # Codemagic via the API so every subsequent build reuses it (Apple
          # caps distribution certs at 2-3 — we must not mint one per build).
          if [ -n "${CERTIFICATE_PRIVATE_KEY:-}" ]; then
            printf '%s' "$CERTIFICATE_PRIVATE_KEY" > /tmp/sign_key.pem
            echo "using persisted CERTIFICATE_PRIVATE_KEY" | tee -a "$DBG"
            MINTED=0
          else
            openssl genrsa -out /tmp/sign_key.pem 2048 2>>"$DBG"
            echo "minted a fresh signing key (will persist after cert creation)" | tee -a "$DBG"
            MINTED=1
          fi
          # --create registers a new distribution cert matching our key (none
          # matches a fresh key) + the App Store profile WITH the push
          # capability. --delete-stale-profiles clears the old non-push profile.
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --certificate-key @file:/tmp/sign_key.pem --create --delete-stale-profiles 2>&1 | tee -a "$DBG"
          keychain add-certificates 2>&1 | tee -a "$DBG"
          # Persist the freshly-minted key as a SECURE app-level Codemagic var so
          # future builds reuse this cert (no new cert per build). Needs the API
          # token + app id passed in at trigger time; skipped if absent.
          if [ "${MINTED:-0}" = "1" ] && [ -n "${CM_API_TOKEN:-}" ] && [ -n "${CM_APP_ID:-}" ]; then
            BODY=$(python3 -c "import json,sys; print(json.dumps({'key':'CERTIFICATE_PRIVATE_KEY','value':open('/tmp/sign_key.pem').read(),'secure':True}))")
            CODE=$(curl -sS -o /dev/null -w '%{http_code}' -X POST "https://api.codemagic.io/apps/$CM_APP_ID/variables" \
              -H "x-auth-token: $CM_API_TOKEN" -H "Content-Type: application/json" -d "$BODY")
            echo "persist CERTIFICATE_PRIVATE_KEY -> HTTP $CODE" | tee -a "$DBG"
          fi
          echo "=== provisioning profiles on disk ===" | tee -a "$DBG"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>&1 | tee -a "$DBG" || true
          echo "=== keychain certificates ===" | tee -a "$DBG"
          keychain list-certificates 2>&1 | tee -a "$DBG" || true
          echo "=== use-profiles (explicit project) ===" | tee -a "$DBG"
          cd "$CM_BUILD_DIR/ios/App"
          xcode-project use-profiles --project "App.xcodeproj" 2>&1 | tee -a "$DBG"
          echo "=== resulting App signing settings ===" | tee -a "$DBG"
          xcodebuild -showBuildSettings -workspace "App.xcworkspace" -scheme "App" 2>/dev/null | grep -E "DEVELOPMENT_TEAM|PROVISIONING_PROFILE|CODE_SIGN_IDENTITY|CODE_SIGN_STYLE" | sort -u | tee -a "$DBG" || true

      - name: Increment build number
        script: |
          # The integration auto-exposes APP_STORE_CONNECT_* env vars; the CLI reads them.
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-build-number "$APP_APPLE_ID" 2>/dev/null || echo "")
          if [ -z "$LATEST_BUILD_NUMBER" ]; then
            # First ever build (or APP_APPLE_ID not set yet): use Codemagic's
            # monotonic per-build counter.
            NEXT="$BUILD_NUMBER"
          else
            NEXT=$((LATEST_BUILD_NUMBER + 1))
          fi
          echo "Setting CFBundleVersion to $NEXT"
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all "$NEXT"

      - name: Build & archive .ipa
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - signing-debug.log
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration             # uses the `LogueOS` App Store Connect integration
        submit_to_testflight: true    # send to TestFlight during post-processing
        submit_to_app_store: false
      email:
        recipients:
          - dreighto@gmail.com
        notify:
          success: true
          failure: true
