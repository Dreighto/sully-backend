# codemagic.yaml — Sully (Dreighto/LogueOS-Companion) iOS thin Capacitor shell
# ---------------------------------------------------------------------------
# BUILD 1 SCOPE: shell + microphone. Proves the app compiles, auto-signs,
# uploads to TestFlight, installs, loads Sully over Tailscale, and can use the
# mic. PUSH (APNs) is intentionally deferred to Build 2 (needs an entitlement +
# bridge code in the remote app) to keep the first build free of push-signing
# risk.
#
# The app is a THIN Capacitor 8 shell: at runtime it loads a REMOTE SvelteKit
# (adapter-node) server via capacitor.config server.url — it does NOT bundle the
# client. Nothing under ios/ is committed; the native project is generated fresh
# every build.
#
# PREREQUISITES (done once in the Codemagic / App Store Connect UI — see
# docs/ios-build-runbook.md):
#   - App Store Connect API key (ID R8SY4X6JM4) wired as a Codemagic *integration*
#     under Team settings, named exactly `codemagic` (matches the integrations block).
#   - App record for bundle com.dreighto.sully exists in App Store Connect.
#   - This file lives on branch feat/ios-capacitor-shell.
# ---------------------------------------------------------------------------

workflows:
  ios-testflight:
    name: Sully iOS -> TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2          # free-tier hardware (Apple silicon M2)

    # Manual triggers only: no `triggering:` block means it never auto-builds.
    # Press "Start new build" in the Codemagic UI and pick this workflow.

    integrations:
      app_store_connect: codemagic      # App Store Connect API key integration (key ID R8SY4X6JM4)

    environment:
      ios_signing:
        distribution_type: app_store    # TestFlight + App Store both use app_store
        bundle_identifier: com.dreighto.sully
      vars:
        XCODE_WORKSPACE: "App.xcworkspace"   # Capacitor (CocoaPods) workspace name
        XCODE_SCHEME: "App"                  # Capacitor default scheme name
        BUNDLE_ID: "com.dreighto.sully"
        TEAM_ID: "G3KJW4VXM9"
        # REPLACE 0000000000 with the numeric Apple ID once the app record exists
        # (App Store Connect > Apps > Sully > General > App Information > Apple ID).
        # Until then the build still works via the $BUILD_NUMBER fallback below.
        APP_APPLE_ID: "0000000000"
      xcode: latest                     # resolves to 26.4 today (satisfies Capacitor 8's Xcode 26+). `latest` avoids a free-tier version-pin gamble; pin 26.4 once confirmed.
      cocoapods: default
      node: 22

    scripts:
      - name: Install JS dependencies
        script: |
          npm ci

      - name: Create placeholder webDir (app loads remote server.url, not a bundled client)
        script: |
          # Capacitor REQUIRES webDir (www/) to exist with an index.html for
          # `cap add ios` / `cap sync` to succeed. SvelteKit adapter-node emits NO
          # static SPA folder, so we write a tiny stub here (www/ is gitignored).
          # Its contents never render at runtime — capacitor.config server.url
          # overrides them. <head> is required or Capacitor refuses bridge injection.
          mkdir -p www
          cat > www/index.html <<'HTML'
          <!doctype html>
          <html>
            <head><meta charset="utf-8" /><title>Sully</title></head>
            <body>Loading Sully…</body>
          </html>
          HTML

      - name: Generate iOS native project fresh (CocoaPods — Capacitor 8 defaults to SPM)
        script: |
          # --packagemanager CocoaPods is REQUIRED: Capacitor 8 changed the iOS
          # default to Swift Package Manager, which produces no Podfile and no
          # App.xcworkspace. The CocoaPods template restores both, which the
          # pod-install + build-ipa --workspace steps below depend on.
          npx cap add ios --packagemanager CocoaPods

      - name: Patch native config (microphone + export-compliance + iOS-15 floor)
        script: |
          # ios/ is regenerated every build, so re-apply native settings here.
          chmod +x scripts/ci-ios-patch.sh
          ./scripts/ci-ios-patch.sh

      - name: Sync web assets + install pods
        script: |
          # cap sync copies www/ into the native project AND runs `pod install`
          # (so the Podfile iOS-15 floor set by the patch step is honored).
          npx cap sync ios

      - name: Set up automatic code signing
        script: |
          # Consumes the distribution cert + provisioning profile Codemagic
          # fetched/created via the App Store Connect integration (key R8SY4X6JM4).
          xcode-project use-profiles

      - name: Increment build number
        script: |
          # The integration auto-exposes APP_STORE_CONNECT_* env vars; the CLI reads them.
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-build-number "$APP_APPLE_ID" 2>/dev/null || echo "")
          if [ -z "$LATEST_BUILD_NUMBER" ]; then
            # First ever build (or APP_APPLE_ID not set yet): use Codemagic's
            # monotonic per-build counter.
            NEXT="$BUILD_NUMBER"
          else
            NEXT=$((LATEST_BUILD_NUMBER + 1))
          fi
          echo "Setting CFBundleVersion to $NEXT"
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all "$NEXT"

      - name: Build & archive .ipa
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration             # uses the `codemagic` App Store Connect integration
        submit_to_testflight: true    # send to TestFlight during post-processing
        submit_to_app_store: false
      email:
        recipients:
          - dreighto@gmail.com
        notify:
          success: true
          failure: true
